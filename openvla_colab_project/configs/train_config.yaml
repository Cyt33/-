
# OpenVLA LoRA 训练配置文件

# 模型配置
model_name: "openvla/openvla-7b"
use_quantization: true
load_in_8bit: true
load_in_4bit: false

# LoRA 配置
use_lora: true
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules:
  - "q_proj"
  - "v_proj"
  - "k_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# 数据配置
train_data_dir: "./data_cleaned"
val_data_dir: "./data_cleaned"
test_data_dir: "./data_cleaned"
batch_size: 8
num_workers: 4
image_size: 224

# 优化器配置
learning_rate: 5e-4
weight_decay: 0.01
gradient_clipping: 1.0

# 学习率调度器
scheduler_type: "linear"
warmup_steps: 1000

# 训练配置
num_epochs: 10
log_interval: 10
save_interval: 1
output_dir: "./runs"

# 日志配置
log_level: "INFO"
log_file: "training.log"
