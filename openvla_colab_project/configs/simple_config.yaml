# OpenVLA 简化训练配置文件

# 模型配置
model_name: "simple"
use_quantization: false

# 数据配置
train_data_dir: "./data_cleaned"
val_data_dir: "./data_cleaned"
test_data_dir: "./data_cleaned"
batch_size: 4
num_workers: 0
image_size: 224

# 优化器配置
learning_rate: 0.001
weight_decay: 0.01
gradient_clipping: 1.0

# 学习率调度器
scheduler_type: "linear"
warmup_steps: 100

# 训练配置
num_epochs: 3
log_interval: 5
save_interval: 1
output_dir: "./runs"

# 日志配置
log_level: "INFO"
log_file: "training.log"
